services:
  app:
    build: .
    # On a Raspberry Pi, swap `build` for the CI-built multi-arch image:
    # image: ghcr.io/atm241/dev-portfolio-dashboard:latest
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-portfolio}@db:5432/${POSTGRES_DB:-portfolio}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-atm241}
      LEETCODE_USERNAME: ${LEETCODE_USERNAME:-atm241}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-me-too}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
