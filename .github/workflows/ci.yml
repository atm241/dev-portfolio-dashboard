name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Server — install, typecheck, test
        working-directory: server
        run: |
          npm ci
          npm run typecheck
          npm test
      - name: Client — install, typecheck, build
        working-directory: client
        run: |
          npm ci
          npm run build

  docker:
    # Build a multi-arch image (amd64 for cloud, arm64 for Raspberry Pi)
    # and push to GitHub Container Registry on every push to main.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dev-portfolio-dashboard:latest
            ghcr.io/${{ github.repository_owner }}/dev-portfolio-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
